name: Build and release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: time_convolver

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_path: target/x86_64-unknown-linux-gnu/release/time_convolver
            asset_stem: time_convolver-linux-x86_64
            archive_ext: tar.gz

          - label: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            bin_path: target/x86_64-apple-darwin/release/time_convolver
            asset_stem: time_convolver-macos-x86_64
            archive_ext: tar.gz

          - label: macos-aarch64
            os: macos-15
            target: aarch64-apple-darwin
            bin_path: target/aarch64-apple-darwin/release/time_convolver
            asset_stem: time_convolver-macos-aarch64
            archive_ext: tar.gz

          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_path: target/x86_64-pc-windows-msvc/release/time_convolver.exe
            asset_stem: time_convolver-windows-x86_64
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust version
        run: rustc --version

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Show build directory (Linux/macOS)
        if: runner.os != 'Windows'
        run: ls -la $(dirname "${{ matrix.bin_path }}")

      - name: Show build directory (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem (Split-Path "${{ matrix.bin_path }}")

      - name: Prepare packaged asset (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "${{ matrix.bin_path }}" "dist/${{ env.BIN_NAME }}"
          chmod +x "dist/${{ env.BIN_NAME }}"
          tar -czf "dist/${{ matrix.asset_stem }}.tar.gz" -C dist "${{ env.BIN_NAME }}"

      - name: Prepare packaged asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "${{ matrix.bin_path }}" "dist/${{ env.BIN_NAME }}.exe"
          Compress-Archive -Path "dist/${{ env.BIN_NAME }}.exe" -DestinationPath "dist/${{ matrix.asset_stem }}.zip"

      - name: Generate SHA256 checksum (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          shasum -a 256 "dist/${{ matrix.asset_stem }}.${{ matrix.archive_ext }}" > "dist/${{ matrix.asset_stem }}.${{ matrix.archive_ext }}.sha256"

      - name: Generate SHA256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "dist/${{ matrix.asset_stem }}.${{ matrix.archive_ext }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.asset_stem }}.${{ matrix.archive_ext }}" | Out-File -Encoding ascii "dist/${{ matrix.asset_stem }}.${{ matrix.archive_ext }}.sha256"

      - name: Network diagnostics (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Testing github.com"
          curl -I https://github.com || true
          echo "Testing api.github.com"
          curl -I https://api.github.com || true
          echo "DNS github.com"
          nslookup github.com || true
          echo "DNS api.github.com"
          nslookup api.github.com || true

      - name: Network diagnostics (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Runner name: $env:RUNNER_NAME"
          Write-Host "Runner OS: $env:RUNNER_OS"
          try { Invoke-WebRequest https://github.com -Method Head | Out-Null; Write-Host "github.com OK" } catch { Write-Host $_ }
          try { Invoke-WebRequest https://api.github.com -Method Head | Out-Null; Write-Host "api.github.com OK" } catch { Write-Host $_ }
          nslookup github.com
          nslookup api.github.com

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_stem }}
          path: |
            dist/${{ matrix.asset_stem }}.${{ matrix.archive_ext }}
            dist/${{ matrix.asset_stem }}.${{ matrix.archive_ext }}.sha256

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.asset_stem }}.${{ matrix.archive_ext }}
            dist/${{ matrix.asset_stem }}.${{ matrix.archive_ext }}.sha256
          generate_release_notes: true